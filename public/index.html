<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, inital-scale=1.0">
    <title>Stad AI - The Course Advisor</title>
    <link rel="stylesheet" href="main.css">
  </head>
  <body>
    <div class="chat-container">
      <div class="chat-header">🎓 STAD AI - The Course Advisor</div>
      <div class="model-selector">
      <span>🤖 Model:</span>
      <select id="modelSelect" onchange="updateModel()">
        <option value="ollama">Loading models...</option>
      </select>
      <span class="model-badge" id="modelBadge">Free</span>
    </div>
      <div class="chat-messages" id="messages">
        <div class="message advisor-message">
          Hello! I'm your course Advisor. How can I help you today?
        </div>
      </div>
      <div class="chat-input">
        <input
          type="text"
          id="userInput"
          placeholder="Type your question..."
          onkeypress="handleKeyPress(event)"
        />
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>
    <script src="main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </body>
</html>
