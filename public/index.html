<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, inital-scale=1.0">
    <title>Stad AI - The Course Advisor</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: Arial, sans-serif;
        background: #f0f2f5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .chat-container {
        width: 100%;
        height: 100vh;
        background: white;
        display: flex;
        flex-direction: column;
      }
      .chat-header {
      background: #075e54;
      color: white;
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
    }
    .chat-messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .message {
      max-width: 60%;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.5;
    }
    .user-message {
      background: #dcf8c6;
      align-self: flex-end;
    }
    .advisor-message {
      background: #f1f1f1;
      align-self: flex-start;
    }
    .advisor-message ul, .advisor-message ol {
      padding-left: 18px;
    }
    .advisor-message p {
      margin-bottom: 6px;
    }
    .chat-input {
      display: flex;
      padding: 12px;
      border-top: 1px solid #eee;
      gap: 8px;
    }
    .chat-input input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 20px;
      outline: none;
      font-size: 14px;
    }
    .chat-input button {
      background: #075e54;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
    }
    .chat-input button:hover { background: #128c7e; }
    .typing { color: #999; font-style: italic; font-size: 13px; }
    </style>
  </head>
  <body>
    <div class="chat-container">
      <div class="chat-header">🎓 STAD AI - The Course Advisor</div>
      <div class="chat-messages" id="messages">
        <div class="message advisor-message">
          Hello! I'm STAD, your course Adivsor. How can I help you today?
        </div>
      </div>
      <div class="chat-input">
        <input
          type="text"
          id="userInput"
          placeholder="Type your question..."
          onkeypress="handleKeyPress(event)"
        />
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>
    <script>
      async function sendMessage() {
        const input = document.getElementById('userInput');
        const message = document.getElementById('messages');
        const question = input.value.trim();
        if (!question) return;

        // Show Student's message
        messages.innerHTML += `
          <div class="message user-message">${question}</div>`;
          input.value = '';
        
        // Show typing indicator
        messages.innerHTML += `
          <div class="message advisor-message typing" id="typing">
            Advisor is typing...
          <div>`;
        messages.scrollTop = messages.scrollHeight;

        // Send to server and get response
        const response = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: question })
        });
        const data = await response.json();

        // Remove typing indicator and show response
        document.getElementById('typing').remove();
        messages.innerHTML += `
          <div class="message advisor-message">${marked.parse(data.reply)}</div>`;
          messages.scrollTop = messages.scrollHeight;
      }

      function handleKeyPress(event) {
        if (event.key === 'Enter') sendMessage();
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </body>
</html>
